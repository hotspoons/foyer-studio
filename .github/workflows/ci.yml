name: ci

on:
  # Run on every branch push so feature-branch CI gives fast feedback,
  # AND on PRs targeting main, AND on direct push to main (merge).
  # The build profile differs by event — see RELEASE_BUILD below.
  # `'**'` matches branches only, not tags (release.yml owns tags).
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ardour_tag:
        description: "Ardour ref to build the shim against. Empty = use the value in .env."
        required: false
        default: ""

# Cancel in-flight runs for the same ref when a new push lands.
# Saves the matrix from chewing through obsolete commits while you're
# iterating on a branch. `main` is excluded from cancellation —
# every commit on main should produce a complete CI record.
#
# Group key includes the workflow name so other workflows (release.yml
# etc.) don't end up in the same cancellation pool.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Opt every JS-based action into Node.js 24 ahead of GitHub's
  # forced-flip on 2026-06-02. Silences the "Node.js 20 actions are
  # deprecated" warning we kept seeing on every run. Drop this once
  # all our actions ship a v* release that runs Node 24 by default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Profile gate. Release build is slow (LTO + codegen-units=1) — only
  # pay when the artifact actually matters: PRs targeting main and the
  # main branch itself. Feature-branch pushes get a debug build for a
  # tighter dev-iteration loop.
  RELEASE_BUILD: ${{ (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

jobs:
  # Rust gates — fmt + clippy + test + a `foyer` binary that the
  # downstream ui-smoke job consumes via artifact (so we don't pay for
  # a second build on a second runner). Matrix mirrors release.yml's
  # so every PR validates all four shipping platforms; on cache hit
  # the non-Linux cells stay cheap.
  #
  # All driven by the same `just` recipes devs run locally — a green
  # `just verify` == a green CI check on the Linux x86_64 cell.
  rust:
    name: rust (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub retired the Intel `macos-13` runner. macOS is arm64
        # only here — Intel Macs need to build from source until/if we
        # produce a universal2 lipo'd binary. Linux still covers both
        # archs natively.
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-14
            os: macos
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      # foyer-desktop pulls in tao+wry which link GTK3 + WebKit2GTK
      # on Linux. The runner image doesn't ship those — clippy/test
      # both fail at the glib-sys build script without them. macOS
      # uses native frameworks (Cocoa/WebKit) and needs no extra deps.
      - name: Install GTK/WebKit deps for foyer-desktop
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          # autoconf/automake/libtool: `audiopus_sys` uses them to
          # build libopus from source (we force OPUS_NO_PKG_CONFIG=1
          # at build time for a self-contained binary). They're
          # usually preinstalled on ubuntu-24.04; explicit for safety.
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev
      # macOS pulls libopus through `audiopus_sys`, which (when
      # pkg-config can't locate Opus) falls back to building libopus
      # from source via autoreconf — failing on a vanilla runner that
      # doesn't ship autoconf/automake/libtool. We want a self-contained
      # binary that doesn't require the end user to `brew install opus`,
      # so let the static source build succeed by providing the
      # autotools toolchain. Cocoa/WebKit are already on the system.
      - name: Install autotools for audiopus_sys (macOS)
        if: matrix.os == 'macos'
        run: brew install autoconf automake libtool
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-cell cache so cross-platform builds don't trample.
          # Bumped to invalidate stale builds that were missing the
          # `OPUS_NO_PKG_CONFIG=1` static-link of libopus.
          key: ci-${{ matrix.os }}-${{ matrix.arch }}-opus-static
      - uses: extractions/setup-just@v2
      - run: just fmt-check
      - run: just clippy
      - run: just test
      # Tailwind CSS goes into the bundled web tree (include_dir! bakes
      # web/styles/tw.build.css into the binary), so always populate it
      # before the link step regardless of profile.
      - run: ./scripts/dev/tw.sh build
      # Pick the build profile based on what RELEASE_BUILD evaluated to
      # at workflow level. `dist/foyer` is a stable staging path so the
      # downstream ui-smoke job doesn't need to know which profile ran.
      - name: Build foyer
        env:
          # Force `audiopus_sys` to static-link libopus from source.
          # Without this, audiopus_sys's build script picks up a system
          # libopus via pkg-config when one happens to be on the
          # builder (transitive apt dep on Linux, brew dep on macOS),
          # and the resulting binary needs `libopus.so.0` at runtime
          # — which the ui-smoke job's runner doesn't have, and end
          # users who run install.sh shouldn't need to apt-get either.
          # autoconf/automake/libtool must be present so the source
          # build's `autoreconf` succeeds; macOS install step has them,
          # Linux runners ship them by default.
          OPUS_NO_PKG_CONFIG: "1"
        run: |
          mkdir -p dist
          if [ "$RELEASE_BUILD" = "true" ]; then
            echo "::notice::Building foyer in RELEASE profile (slow on cache miss)"
            cargo build --release --bin foyer
            cp target/release/foyer dist/foyer
          else
            echo "::notice::Building foyer in DEBUG profile (feature-branch fast path)"
            cargo build --bin foyer
            cp target/debug/foyer dist/foyer
          fi
      - name: Upload foyer binary
        uses: actions/upload-artifact@v4
        with:
          # Same name shape as release.yml so the install.sh URL doesn't
          # change between CI artifacts and tagged releases.
          name: foyer-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/foyer
          retention-days: 7
          if-no-files-found: error

  # Browser-level smoke — boots a stub-backend Foyer server and drives
  # it headless with Playwright. No JACK / Ardour / shim needed; this
  # exercises the three-tier web split (core / ui-core / ui-*) and
  # the Rust server's HTTP + WS surface.
  #
  # Single-platform (linux x86_64) intentionally — Playwright tests
  # the BROWSER (Chromium), not the host OS. The foyer server is just
  # a subprocess; running smoke 4× across the matrix would burn
  # minutes for no extra coverage.
  ui-smoke:
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No GTK install + no rust toolchain + no rust-cache here on
      # purpose — we don't compile anything, the binary is downloaded
      # below and runs against the system's existing libc + libssl.
      - uses: extractions/setup-just@v2
      - uses: oven-sh/setup-bun@v2
      - name: Download foyer binary
        uses: actions/download-artifact@v4
        with:
          name: foyer-linux-x86_64
          path: dist
      - name: Mark foyer executable
        run: chmod +x dist/foyer
      - name: Install Chromium deps
        run: |
          cd tests-ui
          bun install
          bunx playwright install --with-deps chromium
      - name: Build tailwind assets
        run: ./scripts/dev/tw.sh build
      - name: just test-ui-ci (using prebuilt binary)
        env:
          # Skip `cargo build` and use the binary from the rust job —
          # whichever profile that job picked.
          FOYER_BIN: ${{ github.workspace }}/dist/foyer
        run: just test-ui-ci
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests-ui/report
            tests-ui/test-results
          retention-days: 14
      - name: Upload foyer server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: foyer-ci-log
          path: /tmp/foyer-ci.log
          if-no-files-found: ignore
          retention-days: 14

  # Build the C++ Ardour shim per platform and publish each library as
  # an artifact so reviewers can grab them from the Actions tab without
  # cutting a release. Mirrors release.yml's matrix shape so a green
  # ci.yml run gives high confidence the release.yml run for the same
  # commit will also be green.
  #
  # First run on a fresh cache pays the ~30 min Ardour build per cell;
  # cache keys include ARDOUR_TAG so a tag bump invalidates cleanly.
  # After warmup the slow path skips and each cell is mostly the
  # cmake-build step (~1 min).
  shim:
    name: shim (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: x86_64
            shim_ext: so
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            shim_ext: so
          - runner: macos-14
            os: macos
            arch: arm64
            shim_ext: dylib
    steps:
      - uses: actions/checkout@v4

      # Resolve ARDOUR_TAG: workflow_dispatch input wins, otherwise
      # read from `.env` (the project default, committed to the repo).
      # Setting it here writes to $GITHUB_ENV so subsequent steps —
      # including the cache key, which is evaluated per-step — see it.
      - name: Resolve ARDOUR_TAG
        run: |
          if [ -n "${{ github.event.inputs.ardour_tag }}" ]; then
            echo "ARDOUR_TAG=${{ github.event.inputs.ardour_tag }}" >> "$GITHUB_ENV"
            echo "::notice::ARDOUR_TAG=${{ github.event.inputs.ardour_tag }} (workflow_dispatch override)"
          elif [ -f .env ]; then
            grep -E '^ARDOUR_TAG=' .env >> "$GITHUB_ENV"
            echo "::notice::ARDOUR_TAG sourced from .env"
          else
            echo "::error::No ARDOUR_TAG set and no .env file present"
            exit 1
          fi

      - name: Install shim + Ardour build deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          # Package-name notes for Ubuntu 24.04 (noble):
          #   * `liblv2-dev` was renamed to `lv2-dev` between 22.04 and 24.04.
          #   * The versioned `libvamp-hostsdk3v5` / `libvamp-sdk2v5` aren't
          #     in noble; `vamp-plugin-sdk` covers Ardour's build needs.
          #   * `rubberband-cli` is the runtime tool — Ardour links the
          #     library, so we want `librubberband-dev` instead.
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config python3 git curl unzip zip \
            gettext intltool autoconf automake autotools-dev libtool \
            libgtkmm-2.4-dev libglibmm-2.4-dev libsigc++-2.0-dev libxml2-dev \
            libsndfile1-dev libsamplerate0-dev libfftw3-dev liblo-dev libtag1-dev \
            libreadline-dev liblrdf0-dev liblilv-dev libserd-dev libsord-dev \
            libsratom-dev libcurl4-gnutls-dev libwebsockets-dev libpangomm-1.4-dev \
            libsuil-dev lv2-dev librubberband-dev libxext-dev \
            libcairomm-1.0-dev libusb-1.0-0-dev libudev-dev libarchive-dev \
            libboost-dev libxt-dev \
            libasound2-dev libpulse-dev libjack-jackd2-dev \
            vamp-plugin-sdk libaubio-dev libcppunit-dev

      - name: Install shim + Ardour build deps (macOS)
        if: matrix.os == 'macos'
        run: |
          # autoconf/automake/libtool: needed by Ardour's waf build chain.
          # libarchive/libogg/flac: required by Ardour wscript pkg-config
          # checks (libarchive is keg-only on macOS — pkg-config path
          # surfaced below).
          brew install cmake pkg-config autoconf automake libtool \
            glibmm@2.66 libsigc++@2 libxml2 libarchive libogg flac \
            libsndfile libsamplerate fftw liblo taglib readline lrdf lilv \
            serd sord sratom suil lv2 rubberband cairomm@1.14 \
            gtkmm pangomm@2.46 boost aubio cppunit vamp-plugin-sdk
          # Surface keg-only formulas to pkg-config. Without libarchive
          # here, Ardour configure fails on the `libarchive >= 3.0.0`
          # check.
          {
            echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix readline)/lib/pkgconfig:$(brew --prefix glibmm@2.66)/lib/pkgconfig:$(brew --prefix libsigc++@2)/lib/pkgconfig:$(brew --prefix cairomm@1.14)/lib/pkgconfig:$(brew --prefix pangomm@2.46)/lib/pkgconfig:$(brew --prefix libarchive)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "$GITHUB_ENV"
          {
            echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix readline)/lib/pkgconfig:$(brew --prefix glibmm@2.66)/lib/pkgconfig:$(brew --prefix libsigc++@2)/lib/pkgconfig:$(brew --prefix cairomm@1.14)/lib/pkgconfig:$(brew --prefix pangomm@2.46)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Cache Ardour source + build
        id: cache-ardour
        uses: actions/cache@v4
        with:
          path: ext/ardour
          key: ardour-${{ matrix.os }}-${{ matrix.arch }}-${{ env.ARDOUR_TAG }}-v2

      - name: Clone Ardour @ ${{ env.ARDOUR_TAG }}
        if: steps.cache-ardour.outputs.cache-hit != 'true'
        run: ./scripts/dev/ardour.sh clone

      - name: Build Ardour (slow on cache miss, ~30 min)
        if: steps.cache-ardour.outputs.cache-hit != 'true'
        run: |
          ./scripts/dev/ardour.sh configure
          ./scripts/dev/ardour.sh build

      - name: Build shim
        run: |
          cmake -S shims/ardour -B shims/ardour/cmake-build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DFOYER_ARDOUR_SOURCE="$PWD/ext/ardour"
          cmake --build shims/ardour/cmake-build -j

      - name: Upload shim
        uses: actions/upload-artifact@v4
        with:
          name: foyer-shim-${{ matrix.os }}-${{ matrix.arch }}
          path: shims/ardour/cmake-build/libfoyer_shim.${{ matrix.shim_ext }}
          retention-days: 7
          if-no-files-found: error
