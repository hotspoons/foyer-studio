name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Rust gates — fmt + clippy + test, all driven by the same `just`
  # recipes devs run locally. Keeping the steps identical on both
  # sides means a green `just verify` == a green CI check.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # foyer-desktop pulls in tao+wry which link GTK3 + WebKit2GTK
      # on Linux. The runner image doesn't ship those — clippy/test
      # both fail at the glib-sys build script without them.
      - name: Install GTK/WebKit deps for foyer-desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - run: just fmt-check
      - run: just clippy
      - run: just test

  # Browser-level smoke — boots a stub-backend Foyer server and drives
  # it headless with Playwright. No JACK / Ardour / shim needed; this
  # exercises the three-tier web split (core / ui-core / ui-*) and
  # the Rust server's HTTP + WS surface.
  ui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK/WebKit deps for foyer-desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - uses: oven-sh/setup-bun@v2
      - name: Install Chromium deps
        run: |
          cd tests-ui
          bun install
          bunx playwright install --with-deps chromium
      - name: Build tailwind assets
        run: ./scripts/dev/tw.sh build
      - name: just test-ui-ci
        run: just test-ui-ci
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests-ui/report
            tests-ui/test-results
          retention-days: 14
